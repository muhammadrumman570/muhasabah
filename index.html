<!DOCTYPE html>
<html lang="bn" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>মুহাসাবাহ — আত্ম-পর্যালোচনা ও আমল ট্র্যাকার</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Hind Siliguri', 'Kalpurush', 'SolaimanLipi', 'Nikosh', 'sans-serif'],
                    },
                    colors: {
                        emerald: {
                            50: '#f0fdf4',
                            100: '#dcfce7',
                            200: '#bbf7d0',
                            600: '#059669',
                            700: '#047857',
                            800: '#065f46',
                            900: '#064e3b',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Hind Siliguri', 'Kalpurush', 'SolaimanLipi', 'Nikosh', sans-serif;
            background-color: #f8fafc;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        
        /* High contrast styling for PDF print compatibility */
        @media print {
            .no-print {
                display: none !important;
            }
            .print-full {
                width: 100% !important;
                max-width: 100% !important;
                box-shadow: none !important;
                margin: 0 !important;
                padding: 0 !important;
                background-color: #ffffff !important;
            }
            body {
                background-color: #ffffff !important;
                color: #000000 !important;
            }
            .chart-container {
                page-break-inside: avoid;
            }
        }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">

    <header class="bg-gradient-to-r from-emerald-850 via-emerald-800 to-teal-800 text-white shadow-md no-print bg-emerald-900">
        <div class="max-w-7xl mx-auto px-4 py-4 sm:px-6 lg:px-8 flex flex-col md:flex-row items-center justify-between gap-4">
            <div class="flex items-center space-x-3">
                <div class="bg-white/10 p-2.5 rounded-xl border border-white/20">
                    <svg class="w-8 h-8 text-emerald-300" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m12.728 12.728l.707-.707M12 8a4 4 0 100 8 4 4 0 000-8z"></path>
                    </svg>
                </div>
                <div>
                    <h1 class="text-2xl sm:text-3xl font-bold tracking-wide">মুহাসাবাহ (المحاسبة)</h1>
                    <p class="text-emerald-100 text-xs sm:text-sm">দৈনিক আমলনামা ও উন্নত আত্ম-পর্যালোচনা ট্র্যাকার</p>
                </div>
            </div>
            
            <div class="flex flex-wrap items-center justify-center gap-2 sm:gap-3">
                <div class="bg-white/10 rounded-lg p-1.5 flex items-center border border-white/20">
                    <span class="text-xs font-semibold px-2">তারিখ:</span>
                    <input type="date" id="appDatePicker" class="bg-emerald-950 text-white border-0 text-sm rounded-md focus:ring-2 focus:ring-emerald-400 p-1 font-sans cursor-pointer">
                </div>
                
                <nav class="flex bg-white/10 rounded-lg p-1 border border-white/20">
                    <button onclick="switchTab('tracker')" id="tab-tracker" class="px-4 py-1.5 text-xs sm:text-sm font-bold rounded-md transition-all duration-200 bg-white text-emerald-900 shadow-sm">
                        আমল ইনপুট
                    </button>
                    <button onclick="switchTab('dashboard')" id="tab-dashboard" class="px-4 py-1.5 text-xs sm:text-sm font-bold rounded-md transition-all duration-200 text-emerald-100 hover:text-white">
                        ড্যাশবোর্ড ও রিপোর্ট
                    </button>
                </nav>
            </div>
        </div>
    </header>

    <section class="bg-emerald-50 border-b border-emerald-100 py-4 no-print">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div id="slider-container" class="relative overflow-hidden min-h-[105px] flex items-center justify-center text-center px-10 transition-all duration-500">
                <div id="slide-content" class="transition-opacity duration-500 opacity-100">
                    </div>
                
                <button onclick="prevSlide()" class="absolute left-0 top-1/2 -translate-y-1/2 p-2 rounded-full text-emerald-700 hover:bg-emerald-200/60 transition-colors" aria-label="Previous Slide">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"></path></svg>
                </button>
                <button onclick="nextSlide()" class="absolute right-0 top-1/2 -translate-y-1/2 p-2 rounded-full text-emerald-700 hover:bg-emerald-200/60 transition-colors" aria-label="Next Slide">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"></path></svg>
                </button>
            </div>
        </div>
    </section>

    <main class="flex-grow max-w-7xl w-full mx-auto px-4 py-6 sm:px-6 lg:px-8 print-full">
        
        <div id="section-tracker" class="space-y-6">
            <div class="flex items-center justify-between border-b border-slate-200 pb-3">
                <h2 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                    <svg class="w-5 h-5 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-3 7h3m-3 4h3m-6-4h.01M9 16h.01"></path></svg>
                    আজকের আমলনামা লিখুন — <span id="currentInputDateLabel" class="text-emerald-700 font-bold">.. .. ....</span>
                </h2>
                <span class="text-xs bg-emerald-100 text-emerald-800 px-3 py-1 rounded-full font-bold">ব্যক্তিগত হিসাব রক্ষণ</span>
            </div>

            <form id="muhasabahForm" onsubmit="saveDailyData(event)" class="space-y-6">
                
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-5 sm:p-6 hover:shadow-md transition-all">
                    <div class="flex items-center space-x-2 border-b border-slate-100 pb-3 mb-5">
                        <span class="text-2xl">🕌</span>
                        <h3 class="text-lg font-bold text-slate-900">১. সালাত (নামাজ)</h3>
                    </div>
                    
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="bg-slate-50 p-4 rounded-xl border border-slate-150">
                            <label class="block text-sm font-bold text-slate-800 mb-2">১. আজকে কত ওয়াক্ত ফরজ সালাত জামায়াতে আদায় করা হয়েছে?</label>
                            <div class="grid grid-cols-6 gap-1 sm:gap-2">
                                <label class="cursor-pointer"><input type="radio" name="salah_jamaat" value="0" class="sr-only peer" checked><span class="peer-checked:bg-emerald-600 peer-checked:text-white bg-white border border-slate-250 text-slate-700 block text-center py-2 rounded-lg text-xs font-bold transition-all">০ ওয়াক্ত</span></label>
                                <label class="cursor-pointer"><input type="radio" name="salah_jamaat" value="1" class="sr-only peer"><span class="peer-checked:bg-emerald-600 peer-checked:text-white bg-white border border-slate-250 text-slate-700 block text-center py-2 rounded-lg text-xs font-bold transition-all">১ ওয়াক্ত</span></label>
                                <label class="cursor-pointer"><input type="radio" name="salah_jamaat" value="2" class="sr-only peer"><span class="peer-checked:bg-emerald-600 peer-checked:text-white bg-white border border-slate-250 text-slate-700 block text-center py-2 rounded-lg text-xs font-bold transition-all">২ ওয়াক্ত</span></label>
                                <label class="cursor-pointer"><input type="radio" name="salah_jamaat" value="3" class="sr-only peer"><span class="peer-checked:bg-emerald-600 peer-checked:text-white bg-white border border-slate-250 text-slate-700 block text-center py-2 rounded-lg text-xs font-bold transition-all">৩ ওয়াক্ত</span></label>
                                <label class="cursor-pointer"><input type="radio" name="salah_jamaat" value="4" class="sr-only peer"><span class="peer-checked:bg-emerald-600 peer-checked:text-white bg-white border border-slate-250 text-slate-700 block text-center py-2 rounded-lg text-xs font-bold transition-all">৪ ওয়াক্ত</span></label>
                                <label class="cursor-pointer"><input type="radio" name="salah_jamaat" value="5" class="sr-only peer"><span class="peer-checked:bg-emerald-600 peer-checked:text-white bg-white border border-slate-250 text-slate-700 block text-center py-2 rounded-lg text-xs font-bold transition-all">৫ ওয়াক্ত</span></label>
                            </div>
